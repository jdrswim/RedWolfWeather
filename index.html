<script>
// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function $(id) { return document.getElementById(id); }

function openTip(id) { $(id).classList.add("show"); }
function closeTip(id) { $(id).classList.remove("show"); }
document.querySelectorAll(".tip-overlay").forEach(function(o) {
  o.addEventListener("click", function(e) { if (e.target === this) this.classList.remove("show"); });
});

function switchTab(name, btn) {
  document.querySelectorAll(".tab-pane").forEach(function(p) { p.classList.remove("active"); });
  document.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
  $("tab-" + name).classList.add("active");
  btn.classList.add("active");
  if (name === "almanac" && !window._almLoaded) { fetchAlmanac(); }
  if (name === "pws") { fetchPWS(); }
}

var wmoDescMap = {0:"Clear Sky",1:"Mainly Clear",2:"Partly Cloudy",3:"Overcast",45:"Fog",48:"Icy Fog",51:"Light Drizzle",53:"Drizzle",55:"Heavy Drizzle",61:"Light Rain",63:"Rain",65:"Heavy Rain",71:"Light Snow",73:"Snow",75:"Heavy Snow",80:"Rain Showers",81:"Heavy Showers",82:"Violent Showers",95:"Thunderstorms",96:"T-Storm+Hail",99:"Severe T-Storm"};
function wmoDesc(c) { return wmoDescMap[c] || "Unknown"; }
function wmoIcon(c) { if(c===0)return"\u2600\uFE0F";if(c<=2)return"\uD83C\uDF24\uFE0F";if(c===3)return"\u2601\uFE0F";if(c<=48)return"\uD83C\uDF2B\uFE0F";if(c<=55)return"\uD83C\uDF26\uFE0F";if(c<=65)return"\uD83C\uDF27\uFE0F";if(c<=75)return"\u2744\uFE0F";if(c<=82)return"\uD83C\uDF26\uFE0F";return"\u26C8\uFE0F"; }
function deg2dir(d) { var dirs=["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"]; return dirs[Math.round(d/22.5)%16]; }
function uvLbl(v) { return v<=2?"Low":v<=5?"Moderate":v<=7?"High":v<=10?"Very High":"Extreme"; }
function nwsIcon(d) { var s=d.toLowerCase(); if(s.indexOf("thunder")>=0)return"\u26C8\uFE0F";if(s.indexOf("snow")>=0)return"\u2744\uFE0F";if(s.indexOf("rain")>=0||s.indexOf("shower")>=0)return"\uD83C\uDF27\uFE0F";if(s.indexOf("fog")>=0)return"\uD83C\uDF2B\uFE0F";if(s.indexOf("cloud")>=0||s.indexOf("overcast")>=0)return"\u2601\uFE0F";if(s.indexOf("partly")>=0)return"\uD83C\uDF24\uFE0F";if(s.indexOf("sunny")>=0||s.indexOf("clear")>=0)return"\u2600\uFE0F";return"\uD83C\uDF21\uFE0F"; }

// ============================================================
// CLOCK
// ============================================================
function tickClock() {
  var n = new Date();
  $("clock").textContent = n.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
  $("cdate").textContent = n.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}).toUpperCase();
  setTimeout(tickClock, 1000);
}
tickClock();

// ============================================================
// CAMS + GOES
// ============================================================
function showCamFb(wrapId, imgId, url) {
  var wrap = $(wrapId); if (!wrap) return;
  var img = $(imgId); if (img) img.style.display = "none";
  if (wrap.querySelector(".cam-fb")) return;
  var fb = document.createElement("div"); fb.className = "cam-fb";
  fb.innerHTML = '<a href="' + url + '" target="_blank">VIEW LIVE CAM</a>';
  wrap.insertBefore(fb, wrap.querySelector(".cam-overlay"));
}
function refreshCams() {
  var ts = Date.now();
  var gi = $("goes-img");
  if (gi) gi.src = "https://cdn.star.nesdis.noaa.gov/GOES16/ABI/SECTOR/eus/GEOCOLOR/latest.jpg?t=" + ts;
  var s = $("sugar-cam");
  if (s && !$("sugar-wrap").querySelector(".cam-fb")) { s.style.display="block"; s.src="https://skisugar.com/webcam/base.jpg?t="+ts; }
  var h = $("hat-cam");
  if (h && !$("hat-wrap").querySelector(".cam-fb")) { h.style.display="block"; h.src="https://www.surfchex.com/webcam-images/hatteras.jpg?t="+ts; }
}
refreshCams();
setInterval(refreshCams, 60000);

// ============================================================
// CONDITIONS (Open-Meteo)
// ============================================================
function applyConditions(t,feels,dew,humid,wspd,wdir,gust,pres,prec,uv,hi,lo,code,hourly) {
  $("temp").textContent = t; $("temp").classList.remove("ld");
  $("oatemp").textContent = t + "F";
  $("feels").textContent = feels + "F";
  $("dewpt").textContent = dew + "F";
  $("humid").textContent = humid + "%";
  $("wspd").textContent = wspd;
  $("wdir").textContent = deg2dir(wdir) + " " + wdir;
  $("gust").textContent = gust;
  $("pres").textContent = pres;
  $("prec").textContent = prec;
  $("uv").textContent = uv;
  $("uvl").textContent = uvLbl(uv);
  $("hi").textContent = hi;
  $("lo").textContent = lo;

  var c = hi >= 80 ? "#ff6600" : hi >= 60 ? "#ffcc00" : "#4488ff";
  return '<div class="ext-range"><span class="ext-range-lo" style="left:' + Math.max(0,l-1) + '%">' + lo + '</span><div class="ext-range-track" style="left:' + l + '%;width:' + w + '%;background:linear-gradient(90deg,#4488ff,' + c + ')"></div><span class="ext-range-hi" style="left:' + Math.min(88,l+w+1) + '%">' + hi + '</span></div>';

var TSPS_CFG = {lat:35.7113, lon:-78.6141, name:"Red Wolf Farm - S. Wake County, NC", refresh:300000};
var TSPS_HKW = {tornado:30,tornadoes:30,funnel:25,"tornado watch":22,"tornado warning":30,"damaging wind":20,"destructive wind":25,derecho:28,"large hail":20,"giant hail":25,"golf ball":20,"severe thunderstorm":18,supercell:22,hurricane:30,"tropical storm":22,flooding:15,"flash flood":20,thunder:8,thunderstorm:10,storm:6,lightning:7,hail:12,"heavy rain":8,downpour:7,gusty:6,windy:5};
var TSPS_ASEV = {Extreme:35,Severe:25,Moderate:15,Minor:8,Unknown:5};
var TSPS_ACOL = {"Tornado Warning":"#ff0000","Severe Thunderstorm Warning":"#ffa500","Tornado Watch":"#ffff00","Flash Flood Warning":"#8b0000","Flood Warning":"#00ff00","Special Weather Statement":"#ffe4b5"};
var tspsState = {forecasts:[], alerts:[], activeIdx:0, lastUpdate:null, charts:{}, peakScore:0};

function tsps_sevLevel(s) {
  if (s < 10) return {label:"NONE",color:"#1a6b3a",desc:"No severe weather expected"};
  if (s < 25) return {label:"LOW",color:"#22c55e",desc:"Minimal threat"};
  if (s < 50) return {label:"GUARDED",color:"#eab308",desc:"Strong storms possible"};
  if (s < 75) return {label:"ELEVATED",color:"#f97316",desc:"Severe storms likely"};
  if (s < 90) return {label:"HIGH",color:"#ef4444",desc:"Damaging weather expected"};
  return {label:"EXTREME",color:"#dc2626",desc:"Life-threatening weather"};
}

function tsps_computeIndex(p, alerts) {
  var bd = {wind:0,gusts:0,precip:0,instability:0,textual:0,alerts:0};
  var ws = parseInt(p.windSpeed) || 0;
  var wg = parseInt(p.windGust) || 0;
  var pop = (p.probabilityOfPrecipitation && p.probabilityOfPrecipitation.value) || 0;
  var temp = p.temperature || 70;
  var dpRaw = p.dewpoint && p.dewpoint.value;
  var dp = dpRaw != null ? (dpRaw * 9/5 + 32) : null;
  var txt = ((p.detailedForecast||"") + " " + (p.shortForecast||"")).toLowerCase();

  if (ws>=60) bd.wind=20; else if (ws>=45) bd.wind=16; else if (ws>=30) bd.wind=12; else if (ws>=20) bd.wind=7; else if (ws>=15) bd.wind=4; else if (ws>=10) bd.wind=2;
  var eg = Math.max(wg, ws*1.3);
  if (eg>=70) bd.gusts=18; else if (eg>=58) bd.gusts=15; else if (eg>=45) bd.gusts=12; else if (eg>=35) bd.gusts=8; else if (eg>=25) bd.gusts=4; else if (eg>=15) bd.gusts=1;
  if (pop>=90) bd.precip=14; else if (pop>=70) bd.precip=11; else if (pop>=50) bd.precip=8; else if (pop>=30) bd.precip=5; else if (pop>=15) bd.precip=2;
  if (dp !== null) { var sp=temp-dp; if(sp<=3&&temp>=75) bd.instability=16; else if(sp<=5&&temp>=70) bd.instability=13; else if(sp<=8&&temp>=65) bd.instability=9; else if(sp<=12&&temp>=60) bd.instability=6; else if(sp<=15) bd.instability=3; }
  else if (pop>=50 && temp>=70) bd.instability=8;

  var maxTxt=0, hits=0;
  for (var kw in TSPS_HKW) { if (txt.indexOf(kw) >= 0) { maxTxt = Math.max(maxTxt, TSPS_HKW[kw]); hits++; } }
  bd.textual = Math.min(22, maxTxt + Math.min(hits*1.5, 8));

  if (alerts && alerts.length > 0) { var mx=0; alerts.forEach(function(a){mx=Math.max(mx,TSPS_ASEV[a.properties&&a.properties.severity]||5);}); bd.alerts=Math.min(10,mx*(1+Math.min(alerts.length-1,3)*0.15)); }

  var score = Math.min(100, Math.round(bd.wind+bd.gusts+bd.precip+bd.instability+bd.textual+bd.alerts));
  var likelihood = Math.min(99, Math.round((pop*0.35)+(score*0.45)+(bd.textual>10?15:bd.textual>5?8:0)+(alerts&&alerts.length>0?5:0)));
  return {score:score, likelihood:likelihood, breakdown:bd};
}

function tsps_hexToRgb(hex) {
  hex = hex.replace("#","");
  return parseInt(hex.substr(0,2),16)+","+parseInt(hex.substr(2,2),16)+","+parseInt(hex.substr(4,2),16);

function tsps_gaugeSize() {

function tsps_buildGauge(score, size) {

  function arc(a1,a2,rd){var s=p2c(a1,rd),e=p2c(a2,rd);return"M "+s.x+" "+s.y+" A "+rd+" "+rd+" 0 "+(a2-a1>180?1:0)+" 1 "+e.x+" "+e.y;}
  var ticks=[0,10,25,50,75,90,100], tk="";
  ticks.forEach(function(t){
    var a=sA+(t/100)*tot,i=p2c(a,r-12),o=p2c(a,r+12),l=p2c(a,r+22);
    tk+='<line x1="'+i.x+'" y1="'+i.y+'" x2="'+o.x+'" y2="'+o.y+'" stroke="rgba(255,255,255,.2)" stroke-width="1.5"/>';

}

function tsps_refresh() {
  $("tspsContent").innerHTML = '<div class="tsps-ld"><div class="tsps-spinner"></div><p>Refreshing predictions...</p></div>';
  var hdr = {"User-Agent":"TSPS/2.0"};
  Promise.all([
    fetch("https://api.weather.gov/points/"+TSPS_CFG.lat+","+TSPS_CFG.lon, {headers:hdr}),
    fetch("https://api.weather.gov/alerts/active?point="+TSPS_CFG.lat+","+TSPS_CFG.lon, {headers:hdr})
  ]).then(function(responses){
    if(!responses[0].ok) throw new Error("NWS unavailable");
    return Promise.all([responses[0].json(), responses[1].ok ? responses[1].json() : {features:[]}]);
  }).then(function(data){
    var pD=data[0], aD=data[1];
    var fUrl=pD.properties && pD.properties.forecastHourly;
    if(!fUrl) throw new Error("No forecast URL");
    tspsState.alerts = aD.features || [];
    return fetch(fUrl, {headers:{"User-Agent":"TSPS/2.0"}});
  }).then(function(r){
    if(!r.ok) throw new Error("Forecast unavailable");
    return r.json();
  }).then(function(fcData){
    var periods = fcData.properties && fcData.properties.periods;
    if(!periods || !periods.length) throw new Error("No data");
    var now = Date.now();
    var targets = [{h:3,l:"+3 HR"},{h:6,l:"+6 HR"},{h:9,l:"+9 HR"},{h:12,l:"+12 HR"},{h:24,l:"+24 HR"}];
    tspsState.forecasts = targets.map(function(t){
      var tgt = now + t.h*3600000;
      var best = periods[0], bD = Infinity;
      periods.forEach(function(p){ var d=Math.abs(new Date(p.startTime).getTime()-tgt); if(d<bD){bD=d;best=p;} });
      var result = tsps_computeIndex(best, tspsState.alerts);
      return {label:t.l, score:result.score, likelihood:result.likelihood, breakdown:result.breakdown, temp:best.temperature, wind:(best.windSpeed||"")+" "+(best.windDirection||""), pop:(best.probabilityOfPrecipitation&&best.probabilityOfPrecipitation.value)||0, shortForecast:best.shortForecast||"", detailedForecast:best.detailedForecast||""};
    });
    tspsState.peakScore = Math.max.apply(null, tspsState.forecasts.map(function(x){return x.score;}));
    tspsState.lastUpdate = new Date();
    tspsState.activeIdx = 0;
    tsps_renderMain();
  }).catch(function(e){
    $("tspsContent").innerHTML = '<div class="tsps-ld"><p style="color:#ef4444">' + e.message + '</p><p class="sub" style="margin-top:10px"><button class="tsps-rbtn" onclick="tsps_refresh()">Retry</button></p></div>';
  });
}

// ALMANAC
// ============================================================
var RDU_NTEMP = [40.4,43.2,50.5,60.1,68.8,76.8,80.6,79.0,72.7,61.5,51.0,42.8];
var RDU_NPREC = [3.55,3.16,3.82,3.18,3.95,4.06,4.67,4.44,4.39,3.42,3.22,3.27];
var MO_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function fetchAlmanac() {
  var el = $("alm-content");
  var yr = new Date().getFullYear();
  var today = new Date().toISOString().split("T")[0];
  fetch("https://archive-api.open-meteo.com/v1/archive?latitude=35.78&longitude=-78.64&start_date="+yr+"-01-01&end_date="+today+"&daily=temperature_2m_mean,precipitation_sum&temperature_unit=fahrenheit&precipitation_unit=inch&timezone=America%2FNew_York")
  .then(function(r){ return r.json(); })
  .then(function(d){
    var dl = d.daily;
    var moTemp={}, moPrec={}, moCnt={};
    for(var i=0;i<dl.time.length;i++){
      var m=new Date(dl.time[i]+"T12:00:00").getMonth();
      if(!moTemp[m]){moTemp[m]=0;moPrec[m]=0;moCnt[m]=0;}
      if(dl.temperature_2m_mean[i]!=null){moTemp[m]+=dl.temperature_2m_mean[i];moCnt[m]++;}
      if(dl.precipitation_sum[i]!=null) moPrec[m]+=dl.precipitation_sum[i];
    }
    var ytdP=0,ytdTS=0,ytdD=0;
    for(var j=0;j<dl.time.length;j++){if(dl.precipitation_sum[j]!=null)ytdP+=dl.precipitation_sum[j];if(dl.temperature_2m_mean[j]!=null){ytdTS+=dl.temperature_2m_mean[j];ytdD++;}}
    var ytdAT=ytdD?ytdTS/ytdD:0;
    var curMo=new Date().getMonth(), curDay=new Date().getDate();
    var dim=[31,28+(yr%4===0?1:0),31,30,31,30,31,31,30,31,30,31];
    var nP=0,nTT=0,nD=0;
    for(var m2=0;m2<12;m2++){if(m2<curMo){nP+=RDU_NPREC[m2];nTT+=RDU_NTEMP[m2]*dim[m2];nD+=dim[m2];}else if(m2===curMo){var frac=curDay/dim[m2];nP+=RDU_NPREC[m2]*frac;nTT+=RDU_NTEMP[m2]*curDay;nD+=curDay;}}
    var nAT=nD?nTT/nD:0;
    var pDiff=ytdP-nP, tDiff=ytdAT-nAT;
    function dLbl(d,u,th){if(Math.abs(d)<th)return'<span class="alm-cmp normal">NORMAL</span>';return'<span class="alm-cmp '+(d>0?"above":"below")+'">'+(d>0?"+":"")+d.toFixed(1)+u+" "+(d>0?"ABOVE":"BELOW")+'</span>';}
    var tMo="",pMo="";
    for(var m3=0;m3<12;m3++){
      var iC=m3===curMo,iF=m3>curMo;
      var aT=moCnt[m3]?moTemp[m3]/moCnt[m3]:null;
      var tP=moPrec[m3]!=null&&moCnt[m3]?moPrec[m3]:null;
      var td=aT!==null?aT-RDU_NTEMP[m3]:null;
      var pd=tP!==null?tP-RDU_NPREC[m3]:null;
      tMo+='<div class="alm-mo'+(iC?" current":"")+(iF?" future":"")+'"><div class="alm-mo-name">'+MO_NAMES[m3]+'</div><div class="alm-mo-val">'+(aT!==null?aT.toFixed(1):"--")+'</div><div class="alm-mo-nrm">Nrm: '+RDU_NTEMP[m3].toFixed(1)+'</div>'+(td!==null?'<div class="alm-mo-diff '+(Math.abs(td)<0.5?"zero":td>0?"pos":"neg")+'">'+(Math.abs(td)<0.5?"Normal":(td>0?"+":"")+td.toFixed(1))+'</div>':'')+'</div>';
      var pB=tP!==null?Math.min(100,Math.round(tP/Math.max(RDU_NPREC[m3],0.01)*100)):0;
      var pC=pd!==null?(pd>0.25?"#ff8844":pd<-0.25?"#4488ff":"#00d44a"):"#333";
      pMo+='<div class="alm-mo'+(iC?" current":"")+(iF?" future":"")+'"><div class="alm-mo-name">'+MO_NAMES[m3]+'</div><div class="alm-mo-val">'+(tP!==null?tP.toFixed(2)+'"':"--")+'</div><div class="alm-mo-nrm">Nrm: '+RDU_NPREC[m3].toFixed(2)+'"</div>'+(pd!==null?'<div class="alm-mo-diff '+(Math.abs(pd)<0.25?"zero":pd>0?"pos":"neg")+'">'+(Math.abs(pd)<0.25?"Normal":(pd>0?"+":"")+pd.toFixed(2)+'"')+'</div>':'')+(tP!==null?'<div class="alm-mo-bar"><div class="alm-mo-bar-fill" style="width:'+pB+'%;background:'+pC+'"></div></div>':'')+'</div>';
    }
    el.innerHTML='<div class="alm-summary"><div class="alm-big"><div class="alm-big-lbl">YTD Rainfall</div><div class="alm-big-val">'+ytdP.toFixed(2)+'"</div><div class="alm-big-sub">Normal: '+nP.toFixed(2)+'"</div>'+dLbl(pDiff,'"',0.25)+'</div><div class="alm-big"><div class="alm-big-lbl">YTD Avg Temp</div><div class="alm-big-val">'+ytdAT.toFixed(1)+'F</div><div class="alm-big-sub">Normal: '+nAT.toFixed(1)+'F</div>'+dLbl(tDiff,"F",0.5)+'</div><div class="alm-big"><div class="alm-big-lbl">Days Tracked</div><div class="alm-big-val">'+ytdD+'</div><div class="alm-big-sub">'+yr+' Year-to-Date</div></div></div><div class="alm-grid"><div class="alm-card"><h3><span>T</span> Monthly Avg Temperature</h3><div class="alm-mo-grid">'+tMo+'</div></div><div class="alm-card"><h3><span>R</span> Monthly Rainfall Totals</h3><div class="alm-mo-grid">'+pMo+'</div></div></div><div class="alm-note">Data: Open-Meteo Historical Archive (ERA5) - RDU Airport - 30-year normals: 1991-2020 NCEI</div>';
    window._almLoaded=true;
  })
  .catch(function(e){ el.innerHTML='<div class="alm-ld" style="color:#ef4444">'+e.message+'<br><button onclick="fetchAlmanac()" style="margin-top:10px;background:var(--red2);border:1px solid var(--red);color:#fff;padding:6px 16px;border-radius:2px;cursor:pointer">Retry</button></div>'; });
}

// ============================================================
// PWS NETWORK
// ============================================================
var PWS_STATIONS = [
  {id:"KNCRALEI761", name:"Red Wolf Farm", loc:"S. Wake County / Garner", own:true},
  {id:"KNCRALEI828", name:"G. Bragg", loc:"Raleigh", own:false},
  {id:"KNCRALEI1276", name:"Vorbeck Residence", loc:"Juniper", own:false},
  {id:"KNCRALEI1175", name:"Grayson Merrill", loc:"Raleigh", own:false},
  {id:"KNCRALEI668", name:"Jon Wall - near RDU", loc:"Northwest Raleigh", own:false}
];

function fetchPWS() {
  var el = $("pws-content");
  el.innerHTML = '<div class="alm-ld"><div class="tsps-spinner"></div>Loading PWS data...</div>';

  // Use Open-Meteo as reliable free source for each station's approximate location
  // WU API requires a key; we'll use a known community endpoint
  var promises = PWS_STATIONS.map(function(st) {
    return fetch("https://api.weather.com/v2/pws/observations/current?stationId=" + st.id + "&format=json&units=e&apiKey=6532d6454b8aa370768e63d6ba5a832e")
    .then(function(r) { if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(d) {
      var obs = d.observations && d.observations[0];
      if (!obs) throw new Error("No data");
      return {id:st.id, name:st.name, loc:st.loc, own:st.own, obs:obs, ok:true};
    })
    .catch(function() { return {id:st.id, name:st.name, loc:st.loc, own:st.own, ok:false}; });
  });

  Promise.all(promises).then(function(results) {
    var html = '<div style="display:flex;flex-direction:column;gap:14px">';
    results.forEach(function(st) {
      var isOwn = st.own;
      if (!st.ok) {
        html += '<div class="pws-station' + (isOwn?" own":"") + '"><div class="pws-top"><div><div class="pws-name">' + (isOwn?"&#x1F43A; ":"") + st.name + '</div><div class="pws-loc">' + st.loc + '</div><div class="pws-id">' + st.id + '</div></div><div><div class="pws-err">Offline or unavailable</div></div></div></div>';
        return;
      }
      var o = st.obs;
      var imp = o.imperial || {};
      var temp = imp.temp != null ? imp.temp : "--";
      var feels = imp.heatIndex != null ? imp.heatIndex : (imp.windChill != null ? imp.windChill : temp);
      var humid = o.humidity != null ? o.humidity : "--";
      var wspd = imp.windSpeed != null ? imp.windSpeed : "--";
      var wgust = imp.windGust != null ? imp.windGust : "--";
      var wdir = o.winddir != null ? deg2dir(o.winddir) : "--";
      var pres = imp.pressure != null ? imp.pressure : "--";
      var precip = imp.precipTotal != null ? imp.precipTotal : "--";
      var dewpt = imp.dewpt != null ? imp.dewpt : "--";
      var uvi = o.uv != null ? o.uv : "--";
      var solar = o.solarRadiation != null ? o.solarRadiation : "--";
      var obsTime = o.obsTimeLocal ? new Date(o.obsTimeLocal).toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"}) : "--";

      html += '<div class="pws-station' + (isOwn?" own":"") + '">';
      html += '<div class="pws-top"><div><div class="pws-name">' + (isOwn?"&#x1F43A; ":"") + st.name + '</div><div class="pws-loc">' + st.loc + '</div><div class="pws-id">' + st.id + '</div></div><div><div class="pws-temp">' + temp + '<sup>F</sup></div><div class="pws-updated">Updated ' + obsTime + '</div></div></div>';
      html += '<div class="pws-grid">';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">Feels</div><div class="pws-stat-val">' + feels + 'F</div></div>';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">Humidity</div><div class="pws-stat-val">' + humid + '%</div></div>';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">Dewpt</div><div class="pws-stat-val">' + dewpt + 'F</div></div>';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">Wind</div><div class="pws-stat-val">' + wspd + '</div><div class="pws-stat-unit">' + wdir + '</div></div>';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">Gusts</div><div class="pws-stat-val">' + wgust + '</div><div class="pws-stat-unit">mph</div></div>';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">Pressure</div><div class="pws-stat-val">' + pres + '</div><div class="pws-stat-unit">inHg</div></div>';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">Precip</div><div class="pws-stat-val">' + precip + '"</div><div class="pws-stat-unit">today</div></div>';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">UV</div><div class="pws-stat-val">' + uvi + '</div></div>';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">Solar</div><div class="pws-stat-val">' + solar + '</div><div class="pws-stat-unit">W/m2</div></div>';
      html += '<div class="pws-stat"><div class="pws-stat-lbl">Temp</div><div class="pws-stat-val">' + temp + 'F</div></div>';
      html += '</div></div>';
    });
    html += '</div>';
    html += '<div class="alm-note">Data: Weather Underground Personal Weather Stations - Wake County, NC<br>Your station (Red Wolf Farm) highlighted in gold - Refreshes each tab switch</div>';
    el.innerHTML = html;
  });
}
