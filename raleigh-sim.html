const RD = 6;
const BLK = 28;
const GRID = 5;

function nearSpecialRoad(px,pz){
const dDist=Math.abs(px+pz+15)/Math.sqrt(2);
if(dDist<7&&px>=-105&&px<=90&&pz>=-105&&pz<=90) return true;
const dx2=px-100,dz2=pz+100;
const arcDist=Math.abs(Math.sqrt(dx2*dx2+dz2*dz2)-30);
const arcAngle=Math.atan2(dz2,dx2);
if(arcDist<7&&arcAngle>=Math.PI/2-0.2&&arcAngle<=Math.PI+0.2) return true;
return false;
}

function genBuildings() {
const bs = [];
const named = [
{id:"pnc",name:"PNC Plaza",bx:0,bz:0,w:12,h:33,d:10,c:0x6688aa,s:"glass",type:"landmark",desc:"Raleigh's tallest — 33 stories of glass!"},
{id:"hann",name:"Two Hannover Sq",bx:1,bz:0,w:10,h:27,d:9,c:0xbb9966,s:"stone",type:"landmark",desc:"2nd tallest building in Raleigh."},
{id:"wells",name:"150 Fayetteville",bx:-1,bz:0,w:10,h:24,d:9,c:0x444455,s:"dark",type:"job",jobId:"business",desc:"Dark granite tower — 30 stories."},
{id:"cap",name:"NC State Capitol",bx:0,bz:1,w:16,h:7,d:12,c:0xc8b898,s:"capitol",type:"mayor",desc:"Built 1840. Greek Revival with copper dome."},
{id:"sky",name:"Skyhouse",bx:-2,bz:-1,w:8,h:23,d:8,c:0x778899,s:"glass",type:"landmark",desc:"Modern 23-story residential tower."},
{id:"dill",name:"The Dillon",bx:-2,bz:1,w:10,h:17,d:9,c:0x99aabb,s:"glass",type:"shop",desc:"Trendy Warehouse District building."},
{id:"conv",name:"Convention Center",bx:2,bz:0,w:16,h:4,d:10,c:0x889988,s:"civic",type:"landmark",desc:"Raleigh Convention Center."},
{id:"fbc",name:"First Baptist Church",bx:-1,bz:1,w:9,h:9,d:7,c:0xddccbb,s:"church",type:"landmark",desc:"Historic church on Salisbury St."},
{id:"union",name:"Union Station",bx:0,bz:2,w:14,h:4,d:9,c:0x998877,s:"civic",type:"job",jobId:"taxi",desc:"Raleigh's train station."},
{id:"fs1",name:"Fire Station 1",bx:-2,bz:0,w:9,h:5,d:7,c:0xcc3333,s:"civic",type:"job",jobId:"firefighter",desc:"Downtown's fire station."},
{id:"hosp",name:"WakeMed",bx:-2,bz:2,w:12,h:10,d:10,c:0xf0f0f0,s:"modern",type:"job",jobId:"doctor",desc:"Downtown hospital."},
{id:"rpd",name:"RPD HQ",bx:2,bz:1,w:9,h:6,d:7,c:0x3355aa,s:"civic",type:"job",jobId:"police",desc:"Raleigh Police Department."},
{id:"cars",name:"Capital Motors",bx:2,bz:2,w:12,h:3.5,d:8,c:0x2244aa,s:"commercial",type:"car",desc:"Buy a car here!"},
{id:"tech",name:"Tech Store",bx:2,bz:-1,w:8,h:5,d:7,c:0x22aacc,s:"modern",type:"device",desc:"Buy a device for bonus pay."},
{id:"rest",name:"Oak City Grill",bx:1,bz:1,w:8,h:4,d:7,c:0xaa6633,s:"commercial",type:"job",jobId:"chef",desc:"Popular downtown restaurant."},
{id:"sch",name:"Raleigh Academy",bx:-1,bz:-1,w:10,h:5,d:8,c:0x886644,s:"civic",type:"job",jobId:"teacher",desc:"Downtown school."},
{id:"const",name:"Construction Site",bx:1,bz:-1,w:10,h:3,d:8,c:0xb87333,s:"industrial",type:"job",jobId:"builder",desc:"Active construction zone."},
{id:"capt",name:"Captrust Tower",bx:-2,bz:-2,w:9,h:18,d:8,c:0x667788,s:"glass",type:"landmark",desc:"Office tower on the west side."},
{id:"home",name:"Your Apartment",bx:1,bz:2,w:7,h:4,d:6,c:0x8fbc8f,s:"house",type:"home",desc:"Home sweet home!"},
];
const usedBlocks = new Set();
named.forEach(n => {
const cx = n.bx * BLK, cz = n.bz * BLK;
bs.push({...n, x:cx, z:cz, roof:n.c});
usedBlocks.add(`${n.bx},${n.bz}`);
});
const houseColors = [0x8fbc8f,0xa0926b,0xb08060,0x7a9a7a,0x9a8a6a,0x88a088,0xaa9070,0x6a8a6a,0xc0a888];
const smallBuildings = [
{name:"House",h:3.5,s:"house",type:"landmark"},
{name:"Townhouse",h:4.5,s:"house",type:"landmark"},
{name:"Duplex",h:4,s:"house",type:"landmark"},
{name:"Small Shop",h:3.5,s:"commercial",type:"landmark"},
{name:"Apartment",h:8,s:"modern",type:"landmark"},
{name:"Office",h:6,s:"modern",type:"landmark"},
];
const roadBlocks=[[-3,-3],[-4,-4],[-4,-3],[-3,-4],[3,3],[4,4],[4,3],[3,4],[4,2],[3,-3],[4,-4]];
roadBlocks.forEach(([bx2,bz2])=>usedBlocks.add(`${bx2},${bz2}`));
const safeHalf = BLK/2 - RD/2 - 2 - 1;
for (let bx = -GRID+1; bx < GRID; bx++) {
for (let bz = -GRID+1; bz < GRID; bz++) {
if (usedBlocks.has(`${bx},${bz}`)) continue;
const cx = bx * BLK, cz = bz * BLK;
const count = 1 + Math.floor(Math.random() * 2);
for (let i = 0; i < count; i++) {
const t = smallBuildings[Math.floor(Math.random() * smallBuildings.length)];
const maxW = count === 1 ? safeHalf*1.6 : safeHalf*0.9;
const w = Math.min(3 + Math.random() * 4, maxW);
const d = Math.min(4 + Math.random() * 3, safeHalf*1.4);
let ox = 0;
if(count===2) ox = (i===0?-1:1) * (safeHalf*0.45);
else if(count===3) ox = (i-1) * (safeHalf*0.55);
ox = Math.max(-safeHalf + w/2 + 0.5, Math.min(safeHalf - w/2 - 0.5, ox));
const oz = (Math.random()-0.5) * Math.max(0, safeHalf*2 - d - 2);
const col = houseColors[Math.floor(Math.random() * houseColors.length)];
if(nearSpecialRoad(cx+ox, cz+oz)) continue;
bs.push({
id:`gen_${bx}_${bz}_${i}`, name:t.name, x:cx+ox, z:cz+oz, w, h:t.h+Math.random()*2, d,
c:col, roof:col, s:t.s, type:t.type, desc:`A ${t.name.toLowerCase()} in Downtown Raleigh.`
});
}
}
}
[{bx:2,bz:-2,name:"Moore Square"},{bx:-1,bz:2,name:"Nash Square"}].forEach(p => {
if (!usedBlocks.has(`${p.bx},${p.bz}`)) {
bs.push({id:p.name.replace(' ',''),name:p.name,x:p.bx*BLK,z:p.bz*BLK,w:20,h:0.3,d:16,c:0x44aa44,roof:0x44aa44,s:"park",type:"park",desc:"A beautiful public park."});
}
});
return bs;
}

function mp(geo,mat,x,y,z,sh){const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);if(sh)m.castShadow=true;return m;}

function mkC(w,h,fn){const c=document.createElement("canvas");c.width=w;c.height=h;fn(c.getContext("2d"),w,h);const t=new THREE.Texture(c);t.needsUpdate=true;return t;}

function mkFace(b,fw,style){
return mkC(512,512,(ctx,cw,ch)=>{
const bc="#"+b.c.toString(16).padStart(6,"0");
if(style==="glass"){
ctx.fillStyle="#3a5570";ctx.fillRect(0,0,cw,ch);
const rg=ctx.createLinearGradient(0,0,0,ch);
rg.addColorStop(0,"rgba(120,170,200,0.15)");rg.addColorStop(1,"rgba(60,80,100,0.1)");
ctx.fillStyle=rg;ctx.fillRect(0,0,cw,ch);
} else if(style==="dark"){
ctx.fillStyle="#2e2e38";ctx.fillRect(0,0,cw,ch);
for(let i=0;i<500;i++){const v=40+Math.random()*25;ctx.fillStyle=`rgba(${v},${v},${v+8},0.25)`;ctx.fillRect(Math.random()*cw,Math.random()*ch,2+Math.random()*3,1+Math.random()*2);}
} else if(style==="stone"){
ctx.fillStyle=bc;ctx.fillRect(0,0,cw,ch);
for(let i=0;i<300;i++){ctx.fillStyle=`rgba(${100+Math.random()*50},${85+Math.random()*40},${60+Math.random()*30},0.12)`;ctx.fillRect(Math.random()*cw,Math.random()*ch,3+Math.random()*4,2+Math.random()*3);}
ctx.strokeStyle="rgba(0,0,0,0.08)";ctx.lineWidth=2;
for(let ly=0;ly<ch;ly+=ch/Math.max(2,Math.round(b.h/4))){ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(cw,ly);ctx.stroke();}
} else {
ctx.fillStyle=bc;ctx.fillRect(0,0,cw,ch);
for(let y=0;y<ch;y+=12){for(let x=0;x<cw;x+=24){
ctx.fillStyle=`rgba(0,0,0,${0.02+Math.random()*0.04})`;
ctx.fillRect(x+((y/12)%2)*12,y,22,10);
}}
}
const fl=Math.max(1,Math.round(b.h/2.2)),cols=Math.max(1,Math.round(fw/2.2));
for(let fy=0;fy<fl;fy++){for(let fx=0;fx<cols;fx++){
const wx=(fx+0.5)*(cw/cols),wy=(fy+0.18)*(ch/fl);
const wW=cw/(cols+0.8)*0.65,wH=ch/(fl+0.8)*0.55;
const lit=Math.random();
if(style==="glass"){
ctx.fillStyle=lit>0.7?"#ffeebb":lit>0.4?"#7aaccc":"#5a8aaa";
ctx.fillRect(wx-wW/2,wy-wH/2,wW,wH);
ctx.fillStyle="#3a566870";ctx.fillRect(wx-0.5,wy-wH/2,1,wH);ctx.fillRect(wx-wW/2,wy-0.5,wW,1);
} else if(style==="dark"){
ctx.fillStyle=lit>0.65?"#ffe888":lit>0.35?"#667788":"#445566";
ctx.fillRect(wx-wW/2,wy-wH/2,wW,wH);
ctx.strokeStyle="rgba(0,0,0,0.2)";ctx.lineWidth=1;ctx.strokeRect(wx-wW/2,wy-wH/2,wW,wH);
} else {
ctx.fillStyle=lit>0.6?"#ffe888":lit>0.3?"#aaccee":"#5577aa";
ctx.fillRect(wx-wW/2,wy-wH/2,wW,wH);
ctx.strokeStyle="rgba(80,60,40,0.3)";ctx.lineWidth=1.5;ctx.strokeRect(wx-wW/2-1,wy-wH/2-1,wW+2,wH+2);
ctx.fillStyle="rgba(200,190,170,0.4)";ctx.fillRect(wx-wW/2-2,wy+wH/2,wW+4,3);
}
}}
if(b.h<8&&style!=="glass"){
ctx.fillStyle="#4a2a15";
const dw=cw*0.14,dh=ch*0.22;
ctx.fillRect(cw/2-dw/2,ch-dh,dw,dh);
ctx.fillStyle="#3a1a0a";ctx.fillRect(cw/2+dw*0.2,ch-dh*0.5,dw*0.08,dw*0.08);
ctx.strokeStyle="#5a3a1a";ctx.lineWidth=2;ctx.strokeRect(cw/2-dw/2-2,ch-dh-2,dw+4,dh+2);
}
if(style==="glass"){
ctx.strokeStyle="rgba(40,60,80,0.2)";ctx.lineWidth=1;
for(let fx2=0;fx2<=cols;fx2++){const lx=fx2*(cw/cols);ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,ch);ctx.stroke();}
for(let fy2=0;fy2<=fl;fy2++){const ly=fy2*(ch/fl);ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(cw,ly);ctx.stroke();}
}
});
}

function buildB(scene,b){
const g=new THREE.Group();
if(b.s==="park"){
g.add(mp(new THREE.BoxGeometry(b.w,0.3,b.d),new THREE.MeshLambertMaterial({color:0x2d8a2d}),b.x,0.15,b.z));
g.add(mp(new THREE.BoxGeometry(1.2,0.05,b.d-2),new THREE.MeshLambertMaterial({color:0xc8b888}),b.x-3,0.35,b.z));
for(let i=0;i<6;i++) g.add(mkTree(b.x-b.w/2+2+Math.random()*(b.w-4),b.z-b.d/2+2+Math.random()*(b.d-4),0.3));
scene.add(g);return g;
}
const st=b.s==="glass"||b.s==="dark"||b.s==="stone"?b.s:"default";
const ft=mkFace(b,b.w,st),si=mkFace(b,b.d,st);
const mats=[
new THREE.MeshLambertMaterial({map:si}),new THREE.MeshLambertMaterial({map:si}),
new THREE.MeshLambertMaterial({color:b.roof||b.c}),new THREE.MeshLambertMaterial({color:b.c}),
new THREE.MeshLambertMaterial({map:ft}),new THREE.MeshLambertMaterial({map:ft}),
];
const body=new THREE.Mesh(new THREE.BoxGeometry(b.w,b.h,b.d),mats);
body.position.set(b.x,b.h/2,b.z);body.castShadow=true;body.receiveShadow=true;g.add(body);
if(b.s==="glass"&&b.h>15){
g.add(mp(new THREE.BoxGeometry(b.w*0.5,1.2,b.d*0.5),new THREE.MeshLambertMaterial({color:0x556677}),b.x,b.h+0.6,b.z));
g.add(mp(new THREE.CylinderGeometry(0.06,0.06,2.5,4),new THREE.MeshLambertMaterial({color:0x888888}),b.x,b.h+2.5,b.z));
g.add(mp(new THREE.SphereGeometry(0.18,6,6),new THREE.MeshBasicMaterial({color:0xff0000}),b.x,b.h+3.9,b.z));
} else if(b.s==="dark"){
g.add(mp(new THREE.BoxGeometry(b.w+0.4,1.2,b.d+0.4),new THREE.MeshBasicMaterial({color:0x6644aa,transparent:true,opacity:0.4}),b.x,b.h+0.6,b.z));
} else if(b.s==="capitol"){
g.add(mp(new THREE.BoxGeometry(b.w+1,0.5,b.d+1),new THREE.MeshLambertMaterial({color:0xd8c8a8}),b.x,b.h+0.25,b.z));
for(let ci=0;ci<6;ci++){g.add(mp(new THREE.CylinderGeometry(0.3,0.35,b.h*0.7,8),new THREE.MeshLambertMaterial({color:0xd0c0a0}),b.x-b.w/2+2+ci*2.4,b.h*0.35,b.z+b.d/2+0.5,true));}
g.add(mp(new THREE.SphereGeometry(2.5,12,8,0,Math.PI*2,0,Math.PI/2),new THREE.MeshLambertMaterial({color:0x5a8a6a}),b.x,b.h+0.5,b.z,true));
g.add(mp(new THREE.CylinderGeometry(2.8,3,1.2,12),new THREE.MeshLambertMaterial({color:0xc8b898}),b.x,b.h+0.3,b.z));
g.add(mp(new THREE.CylinderGeometry(0.2,0.4,1.5,8),new THREE.MeshLambertMaterial({color:0xc8b898}),b.x,b.h+3.8,b.z));
} else if(b.s==="church"){
const st2=new THREE.Mesh(new THREE.CylinderGeometry(0,1.3,5,4),new THREE.MeshLambertMaterial({color:0xccbbaa}));
st2.position.set(b.x,b.h+2.5,b.z);st2.rotation.y=Math.PI/4;g.add(st2);
g.add(mp(new THREE.BoxGeometry(0.12,1.2,0.12),new THREE.MeshLambertMaterial({color:0x888888}),b.x,b.h+5.3,b.z));
g.add(mp(new THREE.BoxGeometry(0.7,0.12,0.12),new THREE.MeshLambertMaterial({color:0x888888}),b.x,b.h+5.5,b.z));
} else if(b.s==="house"){
const rf=new THREE.Mesh(new THREE.CylinderGeometry(0,b.w*0.72,2,4),new THREE.MeshLambertMaterial({color:0x8B4513}));
rf.position.set(b.x,b.h+1,b.z);rf.rotation.y=Math.PI/4;rf.castShadow=true;g.add(rf);
} else if(b.s==="commercial"){
g.add(mp(new THREE.BoxGeometry(b.w*0.7,0.12,1.2),new THREE.MeshLambertMaterial({color:0xcc4444}),b.x,2.5,b.z+b.d/2+0.6));
} else if(b.s==="industrial"){
g.add(mp(new THREE.CylinderGeometry(0.12,0.12,7,4),new THREE.MeshLambertMaterial({color:0xddaa22}),b.x+b.w/2+1,3.5,b.z));
g.add(mp(new THREE.BoxGeometry(5,0.15,0.15),new THREE.MeshLambertMaterial({color:0xddaa22}),b.x+b.w/2+3.5,7,b.z));
} else if(b.s==="civic"||b.s==="modern"||b.s==="stone"){
g.add(mp(new THREE.BoxGeometry(b.w+0.3,0.3,b.d+0.3),new THREE.MeshLambertMaterial({color:b.roof||b.c}),b.x,b.h+0.15,b.z));
}
g.add(mp(new THREE.BoxGeometry(b.w+2,0.1,b.d+2),new THREE.MeshLambertMaterial({color:0xbbbbbb}),b.x,0.05,b.z));
scene.add(g);return g;
}

function mkTree(x,z,by){
const g=new THREE.Group();const th=1+Math.random()*0.8;
g.add(mp(new THREE.CylinderGeometry(0.1,0.18,th,6),new THREE.MeshLambertMaterial({color:0x5c3a1e}),x,by+th/2,z,true));
const lr=0.7+Math.random()*0.5;const lc=[0x228b22,0x2e7d32,0x33691e][Math.floor(Math.random()*3)];
g.add(mp(new THREE.SphereGeometry(lr,7,5),new THREE.MeshLambertMaterial({color:lc}),x,by+th+lr*0.5,z,true));
return g;
}

function mkStreetLight(x,z){
const g=new THREE.Group();
g.add(mp(new THREE.CylinderGeometry(0.06,0.08,4.5,6),new THREE.MeshLambertMaterial({color:0x444444}),x,2.25,z));
g.add(mp(new THREE.BoxGeometry(1.2,0.05,0.05),new THREE.MeshLambertMaterial({color:0x444444}),x+0.6,4.5,z));
g.add(mp(new THREE.SphereGeometry(0.15,6,6),new THREE.MeshBasicMaterial({color:0xffee88}),x+1.2,4.4,z));
return g;
}

function mkCarMesh(col){
const g=new THREE.Group();
g.add(mp(new THREE.BoxGeometry(1.8,0.65,3.6),new THREE.MeshLambertMaterial({color:col}),0,0.52,0,true));
g.add(mp(new THREE.BoxGeometry(1.5,0.55,1.8),new THREE.MeshLambertMaterial({color:0x88bbdd,transparent:true,opacity:0.65}),0,1.1,-0.15));
const wG=new THREE.CylinderGeometry(0.22,0.22,0.18,8),wM=new THREE.MeshLambertMaterial({color:0x222222});
[[-0.85,0.22,1.05],[0.85,0.22,1.05],[-0.85,0.22,-1.05],[0.85,0.22,-1.05]].forEach(p=>{const w=new THREE.Mesh(wG,wM);w.position.set(p[0],p[1],p[2]);w.rotation.z=Math.PI/2;g.add(w);});
const hl=new THREE.MeshBasicMaterial({color:0xffffcc}),tl=new THREE.MeshBasicMaterial({color:0xff2222});
g.add(mp(new THREE.BoxGeometry(0.25,0.15,0.04),hl,-0.5,0.55,1.82));
g.add(mp(new THREE.BoxGeometry(0.25,0.15,0.04),hl,0.5,0.55,1.82));
g.add(mp(new THREE.BoxGeometry(0.2,0.12,0.04),tl,-0.55,0.55,-1.82));
g.add(mp(new THREE.BoxGeometry(0.2,0.12,0.04),tl,0.55,0.55,-1.82));
return g;
}

function mkPlayer(){
const g=new THREE.Group();const S=0.75;
const skinMat=new THREE.MeshPhongMaterial({color:0xdeb08a,shininess:30});
const jeansMat=new THREE.MeshPhongMaterial({color:0x1e3a5f,shininess:8});
const shirtMat=new THREE.MeshPhongMaterial({color:0xcc2222,shininess:12});
const shoeMat=new THREE.MeshPhongMaterial({color:0x1a1a1a,shininess:40});
const hairMat=new THREE.MeshPhongMaterial({color:0x1a0e05,shininess:20});
g.add(mp(new THREE.BoxGeometry(.26*S,.03*S,.42*S),new THREE.MeshLambertMaterial({color:0x444444}),-.16*S,.015*S,.04*S));
g.add(mp(new THREE.BoxGeometry(.26*S,.03*S,.42*S),new THREE.MeshLambertMaterial({color:0x444444}),.16*S,.015*S,.04*S));
const lShoe=mp(new THREE.BoxGeometry(.24*S,.13*S,.4*S),shoeMat,-.16*S,.065*S,.04*S);
const rShoe=mp(new THREE.BoxGeometry(.24*S,.13*S,.4*S),shoeMat,.16*S,.065*S,.04*S);
g.add(lShoe);g.add(rShoe);

const p1=brks[si],p2=brks[si+1],mid=(p1+p2)/2;
if(!onSp(mid,pos)){ctx.fillStyle='#8a8070';ctx.fillRect(t(p1),ty2(pos)-tw2(5),tw2(p2-p1),tw2(10));ctx.fillStyle='#3a3a3a';ctx.fillRect(t(p1),ty2(pos)-tw2(3),tw2(p2-p1),tw2(6));}

}

for(let si=0;si<brks.length-1;si++){

if(!onSp(pos,mid)){ctx.beginPath();ctx.moveTo(t(pos),ty2(p1));ctx.lineTo(t(pos),ty2(p2));ctx.stroke();}
}

});

  } else {

    }
  } else if(!isSprint&&!cooldownRef.current&&staminaRef.current<100){

    const lookAhead=new THREE.Vector3(
      checkPos.x+Math.sin(yaw)*Math.cos(pitch)*lookDist,
      checkPos.y+1.6+Math.sin(pitch)*lookDist,
      checkPos.z+Math.cos(yaw)*Math.cos(pitch)*lookDist
    );
    cam.position.lerp(ideal,10*dt);
    cam.lookAt(lookAhead.x,lookAhead.y,lookAhead.z);
  } else if(curPov==="top"){
    // Top-down birds eye
    ideal=new THREE.Vector3(checkPos.x,checkPos.y+25,checkPos.z+0.1);
    cam.position.lerp(ideal,4*dt);
    cam.lookAt(checkPos.x,0,checkPos.z);
  } else if(curPov==="cinematic"){
    // Cinematic low angle, slow orbit
    const autoAngle=el*0.15+cAngle;
    const dist2=cDist*0.7;
    ideal=new THREE.Vector3(
      checkPos.x+Math.sin(autoAngle)*dist2,
      checkPos.y+2.5,
      checkPos.z+Math.cos(autoAngle)*dist2
    );
    cam.position.lerp(ideal,2*dt);
    cam.lookAt(checkPos.x,lookY+0.5,checkPos.z);
  } else if(curPov==="shoulder"){
    // Over-the-shoulder — follows look direction
    const dir2=fpYawRef.current;
    const sPitch=fpPitchRef.current;
    ideal=new THREE.Vector3(
      checkPos.x-Math.sin(dir2)*3+Math.cos(dir2)*1.2,
      checkPos.y+2.2,
      checkPos.z-Math.cos(dir2)*3-Math.sin(dir2)*1.2
    );
    cam.position.lerp(ideal,5*dt);
    cam.lookAt(
      checkPos.x+Math.sin(dir2)*4,
      lookY+0.3+Math.sin(sPitch)*3,
      checkPos.z+Math.cos(dir2)*4
    );
  } else {
    // Third person orbit (default)
    const camY2=Math.sin(cPitch)*cDist;
    const camHoriz=Math.cos(cPitch)*cDist;
    const camX2=Math.sin(cAngle)*camHoriz;
    const camZ2=Math.cos(cAngle)*camHoriz;
    ideal=new THREE.Vector3(checkPos.x+camX2,checkPos.y+camY2,checkPos.z+camZ2);
    cam.position.lerp(ideal,4*dt);
    cam.lookAt(checkPos.x,lookY,checkPos.z);
  }
  ren.render(scene,cam);
};anim();

// Two-finger touch: rotate camera + pinch zoom
const onTS2=e=>{
  if(e.touches.length===2){
    const t0=e.touches[0],t1=e.touches[1];
    const cx=(t0.clientX+t1.clientX)/2,cy=(t0.clientY+t1.clientY)/2;
    const dist=Math.sqrt((t1.clientX-t0.clientX)**2+(t1.clientY-t0.clientY)**2);
    camTwoRef.current={cx,cy,dist,angle:camAngleRef.current,pitch:camPitchRef.current,zoom:camDistRef.current};
  }
};
const onTM2=e=>{
  if(e.touches.length===2&&camTwoRef.current){
    e.preventDefault();
    const t0=e.touches[0],t1=e.touches[1];
    const cx=(t0.clientX+t1.clientX)/2,cy=(t0.clientY+t1.clientY)/2;
    const dist=Math.sqrt((t1.clientX-t0.clientX)**2+(t1.clientY-t0.clientY)**2);
    const ref2=camTwoRef.current;
    // Rotate
    const dx=cx-ref2.cx,dy=cy-ref2.cy;
    camAngleRef.current=ref2.angle-dx*0.008*sensRef.current;
    camPitchRef.current=Math.max(0.15,Math.min(1.35,ref2.pitch+dy*0.005*sensRef.current));
    // Pinch zoom
    const scale=ref2.dist/Math.max(dist,10);
    camDistRef.current=Math.max(5,Math.min(30,ref2.zoom*scale));
  }
};
const onTE2=e=>{if(e.touches.length<2)camTwoRef.current=null;};
ren.domElement.addEventListener("touchstart",onTS2,{passive:true});
ren.domElement.addEventListener("touchmove",onTM2,{passive:false});

      </div>
    </div>

    {showA&&(<div style={{position:"absolute",top:100,right:10,background:"rgba(10,15,30,0.92)",backdropFilter:"blur(10px)",border:"1px solid rgba(255,215,0,0.3)",borderRadius:12,padding:12,maxHeight:"50vh",overflowY:"auto",width:210,zIndex:100}}>
      <div style={{color:"#ffd700",fontSize:11,fontWeight:700,marginBottom:8}}>Achievements</div>
      {ACHS.map(a=>{const e=achs.includes(a.id);return(<div key={a.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.05)",opacity:e?1:0.35}}><span style={{fontSize:14}}>{a.icon}</span><div style={{flex:1}}><div style={{color:"#eee",fontSize:9}}>{a.name}</div><div style={{color:"#ffd700",fontSize:8}}>+${a.reward}</div></div>{e&&<span style={{color:"#22c55e",fontSize:12}}>✓</span>}</div>);})}
    </div>)}

    {/* Settings Panel */}
    {showSettings&&(<div style={{position:"absolute",top:100,right:10,background:"rgba(10,15,30,0.95)",backdropFilter:"blur(12px)",border:"1px solid rgba(200,200,200,0.2)",borderRadius:12,padding:14,width:230,zIndex:150}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{color:"#eee",fontSize:12,fontWeight:700,fontFamily:F}}>⚙️ Settings</div>
        <button onClick={()=>setShowSettings(false)} style={{fontFamily:F,fontSize:9,padding:"5px 12px",background:"rgba(255,255,255,0.08)",color:"#aaa",border:"1px solid rgba(255,255,255,0.15)",borderRadius:6,cursor:"pointer"}}>✕ CLOSE</button>
      </div>
      <div style={{color:"#aaa",fontSize:9,fontWeight:600,marginBottom:8,fontFamily:F,textTransform:"uppercase",letterSpacing:1}}>Camera View</div>
      {[
        {id:"third",name:"3rd Person",icon:"🎮",desc:"Classic follow camera"},
        {id:"first",name:"1st Person",icon:"👁️",desc:"See through your eyes"},
        {id:"shoulder",name:"Over Shoulder",icon:"🎯",desc:"Aim-style close cam"},
        {id:"top",name:"Top Down",icon:"🗺️",desc:"Bird's eye view"},
        {id:"cinematic",name:"Cinematic",icon:"🎬",desc:"Auto-orbiting movie cam"},
      ].map(p=>{
        const active=pov===p.id;
        return(<button key={p.id} onClick={()=>{setPov(p.id);povRef.current=p.id;}} style={{
          display:"flex",alignItems:"center",gap:10,width:"100%",padding:"10px 12px",marginBottom:6,
          background:active?"rgba(255,215,0,0.12)":"rgba(255,255,255,0.03)",
          border:active?"1px solid rgba(255,215,0,0.4)":"1px solid rgba(255,255,255,0.08)",
          borderRadius:10,cursor:"pointer",textAlign:"left",fontFamily:F,
        }}>
          <span style={{fontSize:20,width:28,textAlign:"center"}}>{p.icon}</span>
          <div style={{flex:1}}>
            <div style={{color:active?"#ffd700":"#ddd",fontSize:11,fontWeight:600}}>{p.name}</div>
            <div style={{color:active?"rgba(255,215,0,0.6)":"#666",fontSize:8,marginTop:2}}>{p.desc}</div>
          </div>
          {active&&<div style={{width:8,height:8,borderRadius:"50%",background:"#ffd700"}}/>}
        </button>);
      })}
      <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",marginTop:8,paddingTop:10}}>
        <div style={{color:"#aaa",fontSize:9,fontWeight:600,marginBottom:8,fontFamily:F,textTransform:"uppercase",letterSpacing:1}}>Sensitivity</div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
          <span style={{color:"#666",fontSize:9,fontFamily:F}}>Slow</span>
          <input type="range" min="10" max="100" value={sensitivity} onChange={e=>{const v=parseInt(e.target.value);setSensitivity(v);sensRef.current=v/125;}} style={{flex:1,height:4,accentColor:"#ffd700",cursor:"pointer"}}/>
          <span style={{color:"#666",fontSize:9,fontFamily:F}}>Fast</span>
        </div>
        <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:8}}>
          <div style={{color:"#ffd700",fontSize:10,fontFamily:F,fontWeight:600}}>{sensitivity}%</div>
          <button onClick={()=>{setSensitivity(50);sensRef.current=0.4;}} style={{fontFamily:F,fontSize:8,padding:"3px 8px",background:"rgba(255,255,255,0.08)",color:"#aaa",border:"1px solid rgba(255,255,255,0.15)",borderRadius:5,cursor:"pointer"}}>Reset</button>
        </div>
      </div>
      <div style={{borderTop:"1px solid rgba(255,255,255,0.08)",marginTop:8,paddingTop:10}}>
        <div style={{color:"#aaa",fontSize:9,fontWeight:600,marginBottom:6,fontFamily:F,textTransform:"uppercase",letterSpacing:1}}>Controls</div>
        <div style={{color:"#777",fontSize:8,fontFamily:F,lineHeight:1.8}}>
          {pov==="third"?"Two fingers to orbit • Pinch to zoom • Q/E rotate • Scroll zoom":
           pov==="first"?"Drag anywhere to look around • Joystick to move":
           pov==="shoulder"?"Drag to aim • Joystick to move • Camera follows behind":
           pov==="top"?"Bird's eye view of the city":
           "Camera slowly orbits around you"}
        </div>
      </div>
    </div>)}

    {/* Full Map Overlay — Canvas rendered */}
    {showMap&&(<GameMap px={mm.px} pz={mm.pz} onClose={()=>setShowMap(false)} F={F}/>)}

    {/* Inventory */}
    {inventory.length>0&&!showMap&&!inside&&(<div style={{position:"absolute",top:75,left:10,display:"flex",gap:3,flexWrap:"wrap",pointerEvents:"none",maxWidth:150}}>
      {inventory.map((item,i)=>(<div key={i} style={{background:"rgba(0,0,0,0.5)",padding:"3px 6px",borderRadius:5,color:"#ddd",fontSize:8,border:"1px solid rgba(255,255,255,0.1)"}}>{item.emoji} {item.name}</div>))}
    </div>)}

    {working&&(<div style={{position:"absolute",top:"38%",left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,0.85)",padding:18,borderRadius:12,border:"1px solid rgba(255,215,0,0.3)",textAlign:"center",zIndex:50}}>
      <div style={{color:"#ffd700",fontSize:12,fontWeight:600,marginBottom:8}}>{cjDef?.emoji} Working...</div>
      <div style={{width:160,height:7,background:"#222",borderRadius:4,overflow:"hidden"}}><div style={{width:`${wProg*100}%`,height:"100%",background:"linear-gradient(90deg,#ffd700,#ff8c00)",borderRadius:4,transition:"width 0.08s"}}/></div>
    </div>)}

    {notif&&(<div style={{position:"absolute",top:"14%",left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,0.8)",padding:"8px 20px",borderRadius:10,border:"1px solid rgba(255,215,0,0.4)",color:"#ffd700",fontSize:11,fontWeight:600,zIndex:200,whiteSpace:"nowrap"}}>{notif}</div>)}

    {/* Building prompt */}
    {nearB&&!inside&&!working&&(<div style={{position:"absolute",bottom:130,left:"50%",transform:"translateX(-50%)",textAlign:"center",pointerEvents:"auto",maxWidth:"90%"}}>
      <div style={{background:"rgba(0,0,0,0.7)",padding:"6px 16px",borderRadius:8,color:"#fff",fontSize:11,fontWeight:600,marginBottom:6}}>{nearB.name}</div>
      <button onClick={()=>setInside(nearB)} style={{fontFamily:F,fontSize:11,fontWeight:700,padding:"9px 24px",background:"linear-gradient(135deg,#ffd700,#ff9500)",color:"#1a1a2e",border:"none",borderRadius:9,cursor:"pointer"}}>ENTER</button>
    </div>)}

    {/* Car buttons */}
    {nearCar&&!driving&&!inside&&(<button onClick={enterCar} style={{position:"absolute",bottom:130,right:24,fontFamily:F,fontSize:10,fontWeight:700,padding:"10px 18px",background:"linear-gradient(135deg,#44aaff,#2288dd)",color:"#fff",border:"none",borderRadius:10,cursor:"pointer"}}>🚗 GET IN</button>)}
    {driving&&(<button onClick={exitCar} style={{position:"absolute",bottom:130,right:24,fontFamily:F,fontSize:10,fontWeight:700,padding:"10px 18px",background:"rgba(255,255,255,0.15)",color:"#fff",border:"1px solid rgba(255,255,255,0.3)",borderRadius:10,cursor:"pointer"}}>EXIT CAR</button>)}

    {/* Touch */}
    <div onTouchStart={jS} onTouchMove={jM} onTouchEnd={jE} style={{position:"absolute",bottom:20,left:20,width:85,height:85,borderRadius:"50%",background:"rgba(255,255,255,0.06)",border:"2px solid rgba(255,255,255,0.15)",touchAction:"none"}}>
      <div style={{position:"absolute",width:34,height:34,borderRadius:"50%",background:"rgba(255,215,0,0.3)",border:"2px solid rgba(255,215,0,0.5)",top:"50%",left:"50%",transform:`translate(${-17+jvRef.current.dx}px,${-17+jvRef.current.dy}px)`}}/>
    </div>

    {/* Sprint button + stamina bar */}
    <div style={{position:"absolute",bottom:20,left:116,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
      {/* Stamina bar */}
      <div style={{width:54,height:6,background:"rgba(0,0,0,0.4)",borderRadius:3,overflow:"hidden",border:"1px solid rgba(255,255,255,0.15)"}}>
        <div style={{width:`${stamina}%`,height:"100%",borderRadius:3,transition:"width 0.1s",
          background:cooldown?"#ff3333":stamina>50?"#44cc44":stamina>25?"#ccaa22":"#cc4422"}}/>
      </div>
      <button
        onTouchStart={e=>{e.preventDefault();if(cooldownRef.current)return;sprintRef.current=!sprintRef.current;setSprinting(s=>!s);}}
        onTouchEnd={e=>{e.preventDefault();}}
        onMouseDown={()=>{if(cooldownRef.current)return;sprintRef.current=!sprintRef.current;setSprinting(s=>!s);}}
        onMouseUp={()=>{}}
        style={{width:50,height:50,borderRadius:"50%",
          background:cooldown?"rgba(255,50,50,0.2)":sprinting?"rgba(255,150,0,0.6)":"rgba(255,255,255,0.08)",
          border:cooldown?"2px solid rgba(255,50,50,0.4)":sprinting?"2px solid rgba(255,150,0,0.8)":"2px solid rgba(255,255,255,0.2)",
          fontFamily:F,fontSize:cooldown?7:8,fontWeight:700,
          color:cooldown?"#ff6666":sprinting?"#ffd700":"rgba(255,255,255,0.5)",
          cursor:cooldown?"default":"pointer",touchAction:"none",userSelect:"none",
          display:"flex",alignItems:"center",justifyContent:"center",opacity:cooldown?0.6:1}}
      >{cooldown?"⏳":"🏃 RUN"}</button>
    </div>

    {nearB&&!inside&&(<button onClick={()=>setInside(nearB)} style={{position:"absolute",bottom:32,right:20,width:60,height:60,borderRadius:"50%",background:"linear-gradient(135deg,rgba(255,215,0,0.8),rgba(255,150,0,0.8))",border:"2px solid rgba(255,215,0,0.6)",fontFamily:F,fontSize:9,fontWeight:700,color:"#1a1a2e",cursor:"pointer"}}>ENTER</button>)}

    <div style={{position:"absolute",bottom:4,left:"50%",transform:"translateX(-50%)",color:"rgba(255,255,255,0.12)",fontSize:7,fontFamily:F,pointerEvents:"none"}}>WASD move • Shift sprint • Q/E rotate • Scroll zoom • 2-finger rotate/pinch{driving?" • Driving!":""}</div>
  </>}
</div>

);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
